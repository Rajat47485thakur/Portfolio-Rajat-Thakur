<div class="glass-card project-card h-100 d-flex flex-column">
  <div class="project-img-wrapper">
    <img [src]="project.src" class="project-img" [alt]="project.name">
    <div class="project-overlay">
      <a [routerLink]="['/project', project.id]" class="bt btn-outline view-btn">
        <span>View Details</span>
        <i class="fa fa-arrow-right ms-2"></i>
      </a>
    </div>
  </div>
  
  <div class="card-body d-flex flex-column p-4 flex-grow-1">
    <h3 class="card-title fw-bold mb-3 font-outfit text-main">
      {{ project.name }}
    </h3>
    <p class="card-text flex-grow-1 text-muted mb-4">{{ project.description }}</p>
    
    <div class="mt-auto">
      <div class="d-flex flex-wrap gap-2">
        @for (technology of project.technologies.slice(0, 4); track technology) {
          <span class="tech-badge">{{ technology }}</span>
        }
        @if (project.technologies.length > 4) {
          <span class="tech-badge more-badge">+{{project.technologies.length - 4}}</span>
        }
      </div>
    </div>
  </div>
</div>
