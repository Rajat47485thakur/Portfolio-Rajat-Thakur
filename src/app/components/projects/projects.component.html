<section id="projects" class="container mx-auto py-5">
  <div class="row mb-5" appScrollReveal>
    <div class="col-12 text-center">
      <p class="fs-5 text-muted mb-2 font-outfit">Browse my recent</p>
      <h1 class="display-5 fw-bold font-outfit text-gradient">Projects</h1>
    </div>
  </div>

  <div class="projects-grid">
    @for (project of projects; track project.id) {
      <app-project-item [project]="project" appScrollReveal class="reveal-up"></app-project-item>
    }
  </div>
</section>
