<section id="contacts" class="container mx-auto py-5 relative">
  <div class="glow-bg glow-purple" style="top: 0; left: 50%; transform: translateX(-50%);"></div>

  <div class="row mb-5" appScrollReveal>
    <div class="col-12 text-center">
      <p class="fs-5 text-muted mb-2 font-outfit">Get in Touch</p>
      <h1 class="display-5 fw-bold font-outfit text-gradient">Contact Me</h1>
      <p class="text-muted mt-3 max-w-md mx-auto">
        I'm currently available for freelance work or full-time opportunities. 
        Whether you have a question or just want to say hi, I'll try my best to get back to you!
      </p>
    </div>
  </div>

  <div class="row justify-content-center">
    <div class="col-12 col-md-10 col-lg-8 reveal-up" appScrollReveal>
      <div class="glass-card p-4 p-md-5">
        <div class="contact-grid">
          
          <a [href]="'mailto:' + email" class="contact-item">
            <div class="contact-icon-wrapper">
              <i class="fa fa-envelope fs-4"></i>
            </div>
            <div class="contact-info">
              <h5 class="mb-1 font-outfit text-main">Email</h5>
              <span class="text-muted small">rajatthakurdev24&#64;gmail.com</span>
            </div>
          </a>

          <a (click)="goToPhone()" class="contact-item">
            <div class="contact-icon-wrapper">
              <i class="fas fa-phone fs-4"></i>
            </div>
            <div class="contact-info">
              <h5 class="mb-1 font-outfit text-main">Phone</h5>
              <span class="text-muted small">+91 70186 83789</span>
            </div>
          </a>

          <a (click)="goToWhatsapp()" class="contact-item">
            <div class="contact-icon-wrapper">
              <i class="fab fa-whatsapp fs-4"></i>
            </div>
            <div class="contact-info">
              <h5 class="mb-1 font-outfit text-main">WhatsApp</h5>
              <span class="text-muted small">Message Me</span>
            </div>
          </a>

          <a (click)="goToLinkedin()" class="contact-item">
            <div class="contact-icon-wrapper">
              <i class="fab fa-linkedin fs-4"></i>
            </div>
            <div class="contact-info">
              <h5 class="mb-1 font-outfit text-main">LinkedIn</h5>
              <span class="text-muted small">Connect with me</span>
            </div>
          </a>

        </div>
      </div>
    </div>
  </div>
</section>
