<section class="container col-11 col-lg-10 mx-auto mt-5 pt-5 mb-5 pb-5">
  <button class="bt btn-color-2 mb-4" (click)="goBack()">
    <i class="fa fa-arrow-left me-2"></i> Back to Portfolio
  </button>

  <div *ngIf="project" class="row">
    <div class="col-12 col-lg-6 mb-4">
      <img [src]="project.src" [alt]="project.name" class="img-fluid rounded shadow w-100">
    </div>
    
    <div class="col-12 col-lg-6">
      <h1 class="fw-bold mb-3">{{ project.name }}</h1>
      
      <div class="mb-4">
        <span class="fs-5 text-muted">Project Overview</span>
        <hr class="mt-2 mb-3">
        <ul class="fs-5">
          <li *ngFor="let point of project.fullDescription" class="mb-2">{{ point }}</li>
        </ul>
      </div>

      <div class="mb-4">
        <span class="fs-5 text-muted">Technologies Used</span>
        <hr class="mt-2 mb-3">
        <div class="d-flex flex-wrap gap-2">
          <span *ngFor="let tech of project.technologies" class="badge bg-primary fs-6 fw-normal px-3 py-2">
            {{ tech }}
          </span>
        </div>
      </div>

      <div class="mt-5">
        <a [href]="project.link" target="_blank" class="bt btn-color-3 d-inline-block">
          <i class="fab fa-github me-2"></i> View on Github
        </a>
      </div>
    </div>
  </div>

  <div *ngIf="!project" class="text-center my-5">
    <h2>Project not found</h2>
    <p>The project you are looking for does not exist.</p>
  </div>
</section>
