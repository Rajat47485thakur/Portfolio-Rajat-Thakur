<section class="container col-11 col-lg-10 mx-auto mt-5 pt-5 mb-5 pb-5">
  <button class="bt btn-outline mb-5 w-auto px-4 d-inline-flex align-items-center justify-content-center" (click)="goBack()">
    <i class="fa fa-arrow-left me-2"></i> Back to Portfolio
  </button>

  <div *ngIf="project" class="row align-items-start" appScrollReveal>
    <div class="col-12 col-lg-6 mb-5">
      <div class="glass-card p-2 overflow-hidden">
        <img [src]="project.src" [alt]="project.name" class="img-fluid rounded-3 w-100" style="object-fit: cover; max-height: 600px;">
      </div>
    </div>
    
    <div class="col-12 col-lg-6 ps-lg-5 reveal-right" appScrollReveal>
      <h1 class="fw-bold mb-4 display-4 font-outfit text-gradient">{{ project.name }}</h1>
      
      <div class="mb-5 glass-panel p-4">
        <h3 class="fs-5 text-muted fw-semibold text-uppercase font-outfit mb-3">Project Overview</h3>
        <ul class="fs-5 text-muted list-unstyled" style="line-height: 1.8;">
          <li *ngFor="let point of project.fullDescription" class="mb-3 d-flex align-items-start">
            <i class="fas fa-check-circle text-primary mt-1 me-3"></i>
            <span>{{ point }}</span>
          </li>
        </ul>
      </div>

      <div class="mb-5">
        <h3 class="fs-5 text-muted fw-semibold text-uppercase font-outfit mb-3">Technologies Used</h3>
        <div class="d-flex flex-wrap gap-2 mt-3">
          <span *ngFor="let tech of project.technologies" class="tech-badge">
            {{ tech }}
          </span>
        </div>
      </div>

      <div class="mt-5">
        <a [href]="project.link" target="_blank" class="bt w-auto px-5 d-inline-flex align-items-center justify-content-center text-decoration-none">
          <i class="fab fa-github me-2 fs-4"></i> 
          <span>View Source on Github</span>
        </a>
      </div>
    </div>
  </div>

  <div *ngIf="!project" class="text-center my-5 glass-panel p-5">
    <h2 class="text-gradient">Project not found</h2>
    <p class="text-muted">The project you are looking for does not exist.</p>
  </div>
</section>
