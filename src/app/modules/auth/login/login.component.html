<div class="login-wrapper">
  <div class="glow-bg">
    <div class="glow-circle blue"></div>
    <div class="glow-circle cyan"></div>
  </div>

  <div class="login-container">
    <!-- Back Button -->
    <a routerLink="/" class="back-link mb-4 d-inline-flex align-items-center">
      <i class="fas fa-arrow-left me-2"></i> <span>Back to Site</span>
    </a>

    <!-- Glass Login Card -->
    <div class="login-card">
      <div class="card-header-logo text-center mb-4">
        <h2 class="font-outfit fw-bold text-white mb-1">Rajat<span class="text-accent">.CMS</span></h2>
        <p class="text-muted small">Portfolio Administration Terminal</p>
      </div>

      <!-- Error Alert Bubble -->
      <div class="alert alert-danger-custom d-flex align-items-center mb-4" *ngIf="errorMessage">
        <i class="fas fa-exclamation-triangle me-2"></i>
        <span>{{ errorMessage }}</span>
      </div>

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
        <!-- Username input -->
        <div class="form-group mb-4">
          <label class="form-label font-outfit text-white">Administrator Username</label>
          <div class="input-icon-group">
            <i class="fas fa-user input-icon"></i>
            <input 
              type="text" 
              class="form-control text-input" 
              placeholder="Enter admin username"
              formControlName="username"
              [ngClass]="{'is-invalid': loginForm.get('username')?.touched && loginForm.get('username')?.invalid}">
          </div>
        </div>

        <!-- Password input -->
        <div class="form-group mb-5">
          <label class="form-label font-outfit text-white">Security Password</label>
          <div class="input-icon-group">
            <i class="fas fa-lock input-icon"></i>
            <input 
              [type]="showPassword ? 'text' : 'password'" 
              class="form-control text-input" 
              placeholder="••••••••"
              formControlName="password"
              [ngClass]="{'is-invalid': loginForm.get('password')?.touched && loginForm.get('password')?.invalid}">
            <button 
              type="button" 
              class="password-toggle-btn" 
              (click)="togglePasswordVisibility()"
              aria-label="Toggle Password Visibility">
              <i class="fas" [ngClass]="showPassword ? 'fa-eye-slash' : 'fa-eye'"></i>
            </button>
          </div>
        </div>

        <!-- Submit button -->
        <button 
          type="submit" 
          class="btn-submit font-outfit" 
          [disabled]="loginForm.invalid || isLoading">
          <span *ngIf="!isLoading">Authorize Session</span>
          <span *ngIf="isLoading" class="d-flex align-items-center justify-content-center">
            <span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
            Verifying Identity...
          </span>
        </button>
      </form>
    </div>
  </div>
</div>
