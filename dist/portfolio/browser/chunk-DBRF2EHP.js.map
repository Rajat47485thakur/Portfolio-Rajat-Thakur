<section id="projects" class="container mx-auto py-5">
  <div class="row mb-5" appScrollReveal>
    <div class="col-12 text-center">
      <p class="section-label mb-2">Portfolio</p>
      <h1 class="display-3 fw-bold font-outfit text-gradient mb-3">Featured Case Studies</h1>
      <p class="fs-5 text-muted max-w-2xl mx-auto">Explore high-performance engineering solutions, from real-time marketplaces to data-intensive admin ecosystems.</p>
    </div>
  </div>

  <div class="projects-grid">
    @for (project of projects; track project.id) {
      <app-project-item [project]="project" appScrollReveal class="reveal-up"></app-project-item>
    }
  </div>
</section>
