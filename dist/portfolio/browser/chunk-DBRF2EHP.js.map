<section id="skill-set" class="container mx-auto py-5">
  <div class="row mb-5" appScrollReveal>
    <div class="col-12 text-center">
      <p class="fs-5 text-muted mb-2 font-outfit">Technologies I work with</p>
      <h1 class="display-5 fw-bold font-outfit text-gradient">Tech Stack</h1>
    </div>
  </div>

  <div class="glass-card py-4 reveal-up" appScrollReveal>
    <div class="experience-items">
      <div class="experience-slide">
        @for ( item of getExperience; track item.index ) {
          <div class="tech-icon-wrapper">
            <img ngSrc="{{item.src}}" [alt]="item.name" class="item-img" width="60" height="60">
            <span class="tech-name">{{ item.name }}</span>
          </div>
        }
      </div>
    </div>
  </div>
</section>
